name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: libs/checkpoint-tigris
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync

      - name: Lint (ruff)
        run: |
          uv run ruff check .
          uv run ruff format . --diff

      - name: Type check (ty)
        run: uv run ty check langgraph

      - name: Test
        # Offline unit tests always run. Live conformance/integration/fork tests
        # run only when Tigris credentials are present as repository secrets;
        # otherwise they are skipped automatically by the test suite.
        env:
          TIGRIS_TEST_BUCKET: ${{ secrets.TIGRIS_TEST_BUCKET }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: uv run pytest
